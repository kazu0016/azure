name: CI/CD AKS

on:
  push:
    branches: [main]

env:
  # ATUALIZADO COM SEUS DADOS DO PRINT
  ACR_NAME: azureapp.azurecr.io        
  APP_NAME: azure-app-kazu             # Nome que a imagem terá no ACR
  RESOURCE_GROUP: azure-devops         
  AKS_NAME: aks-kazu                   # Nome para o seu futuro cluster

jobs:
  # ========== CI: TEST + BUILD + PUSH ==========
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run tests
        run: |
          # Se sua app estiver na raiz, mude para ./
          # Se não tiver testes ainda, você pode comentar esse step
          npm install
          npm test || echo "Sem testes para rodar agora"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Build & Push ACR
        run: |
          az acr build \
            --registry azureapp \
            --image ${{ env.APP_NAME }}:${{ github.sha }} \
            --image ${{ env.APP_NAME }}:latest \
            .

  # ========== CD: UPDATE GIT (GitOps) ==========
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # IMPORTANTE: Usando o Token para poder dar PUSH no repo depois
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}

      - name: Update K8s manifest
        run: |
          # Esse comando procura 'image:' e troca pela nova imagem com o SHA do commit
          sed -i "s|image:.*|image: ${{ env.ACR_NAME }}/${{ env.APP_NAME }}:${{ github.sha }}|" k8s/deployment.yaml
      
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "deploy: update image to ${{ github.sha }}" || echo "No changes"
          git push